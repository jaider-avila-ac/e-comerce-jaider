spring.application.name=ecommerce

# Lee el .env si existe (local). En Docker/VPS las vars vienen del entorno directamente.
spring.config.import=optional:file:.env[.properties]

# ── Base de datos (PostgreSQL) ─────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── HikariCP ────────────────────────────────────────────────────────────────
spring.datasource.hikari.pool-name=EcommerceHikari
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000

# ── Redis ──────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=${CACHE_TYPE:simple}

# ── Spring Session (Redis) ─────────────────────────────────────────────────
spring.session.store-type=${SESSION_STORE_TYPE:none}
spring.session.redis.flush-mode=on_save
spring.session.redis.namespace=ecommerce:session
spring.session.timeout=3600

# ── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Servidor ───────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ── CORS ───────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# ── URL pública propia (para el proxy de imágenes, oculta que se usa Cloudinary) ──
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.shipping.flat-cost-centavos=${SHIPPING_FLAT_COST_CENTS}

# ── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Bogota
spring.jackson.property-naming-strategy=SNAKE_CASE

# ── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── Upload ───────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Google OAuth2 ─────────────────────────────────────────────────────────────
google.client-id=${GOOGLE_CLIENT_ID}

# ── Resend Email ──────────────────────────────────────────────────────────────
resend.api-key=${RESEND_API_KEY}
resend.from=${RESEND_FROM:Calzacaribe <onboarding@resend.dev>}
email.override=${EMAIL_OVERRIDE:}

# ── Wompi (pasarela de pagos) ──────────────────────────────────────────────────
# Sandbox: dashboard.wompi.co → modo Sandbox → llaves pub_test_.../prv_test_...
wompi.public-key=${WOMPI_PUBLIC_KEY:}
wompi.private-key=${WOMPI_PRIVATE_KEY:}
wompi.integrity-key=${WOMPI_INTEGRITY_KEY:}
wompi.events-key=${WOMPI_EVENTS_KEY:}

# ── Frontend tienda (redirect post-pago del checkout hospedado) ────────────────
frontend.tienda-url=${FRONTEND_TIENDA_URL:http://localhost:5174}
