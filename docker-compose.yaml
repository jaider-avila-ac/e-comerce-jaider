name: ecommerce-api

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"   # accesible desde el host (dev local con mvn)
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      default:
        # Alias único: el servicio "api" también está en la red externa 'coolify',
        # donde el propio Redis interno de Coolify (coolify-redis) ya responde al
        # alias genérico "redis" — usar un alias específico evita esa colisión.
        aliases:
          - ecommerce-redis

  # ── Spring Boot API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Redis: alias único (ver servicio "redis" abajo) — evita colisión con
      # coolify-redis, que también responde al alias genérico "redis" en la red 'coolify'.
      REDIS_HOST: ecommerce-redis
      REDIS_PORT: 6379
      CACHE_TYPE: redis
      SESSION_STORE_TYPE: redis
    ports:
      # HOST_PORT: puerto expuesto en el host (VPS o local). El puerto interno del
      # contenedor siempre es 8080 (fijo — no confundir con SERVER_PORT, que es el
      # puerto en el que escucha Spring Boot DENTRO del contenedor y no debe cambiarse).
      - "${HOST_PORT:-8080}:8080"
    extra_hosts:
      # Permite que host.docker.internal resuelva al host en Linux/VPS
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - default
      # Red de Coolify: necesaria para resolver por nombre el contenedor de Postgres
      # (calzacaribe-postgresql-database) cuando corre en el VPS.
      - coolify

volumes:
  redis_data:

networks:
  default:
  coolify:
    external: true
